    // ----------------------------------------------------------
    // 8.7 AIAssistant - AI 助手（OpenAI 兼容协议）
    //
    // 支持任意 OpenAI Chat Completions 兼容的服务：
    // - OpenAI:  https://api.openai.com/v1
    // - DeepSeek: https://api.deepseek.com/v1
    // - 智谱 GLM: https://open.bigmodel.cn/api/paas/v4
    // - Ollama:  http://localhost:11434/v1 (本地)
    // - 月之暗面: https://api.moonshot.cn/v1
    // - 自建 OpenAI 兼容服务（vLLM / LM Studio / etc.）
    //
    // 命令：
    // - /summarize   总结当前文档
    // - /translate   翻译当前文档（自动检测源语言 → 中文）
    // - /continue    续写
    // - /fix         修正语法/拼写
    // - /explain     解释选中内容
    // - 自定义 prompt
    // ----------------------------------------------------------
    const AIAssistant = {
      config: null,
      history: [],   // 对话历史 [{role, content}]
      loading: false,

      init() {
        const raw = localStorage.getItem('markdoc.aiConfig.v1');
        if (raw) {
          try { this.config = JSON.parse(raw); } catch (_) {}
        }
      },

      isConfigured() {
        return !!(this.config && this.config.endpoint && this.config.apiKey && this.config.model);
      },

      saveConfig(cfg) {
        this.config = cfg;
        localStorage.setItem('markdoc.aiConfig.v1', JSON.stringify(cfg));
      },

      clearConfig() {
        this.config = null;
        localStorage.removeItem('markdoc.aiConfig.v1');
        this.history = [];
      },

      async chat(userMessage, opts = {}) {
        if (!this.isConfigured()) throw new Error('请先在抽屉菜单 → AI 助手 配置 API');
        if (this.loading) throw new Error('AI 正在响应中');

        this.loading = true;
        try {
          const systemPrompt = opts.systemPrompt ||
            `你是马克档 Markdown 阅读器内置的 AI 助手。请用中文回复，除非用户用其他语言提问。简洁、有帮助、Markdown 友好。`;

          const messages = [
            { role: 'system', content: systemPrompt },
            ...this.history.slice(-10),
            { role: 'user', content: userMessage },
          ];

          if (opts.context) {
            messages.splice(1, 0, {
              role: 'system',
              content: `当前文档内容（参考用）：\n\n${opts.context.slice(0, 4000)}`,
            });
          }

          const url = this.config.endpoint.replace(/\/+$/, '') + '/chat/completions';
          const resp = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + this.config.apiKey,
            },
            body: JSON.stringify({
              model: this.config.model,
              messages,
              temperature: opts.temperature ?? 0.7,
              max_tokens: opts.max_tokens ?? 2000,
              stream: false,
            }),
          });

          if (!resp.ok) {
            const errText = await resp.text();
            throw new Error(`AI 返回 ${resp.status}: ${errText.slice(0, 200)}`);
          }

          const data = await resp.json();
          const reply = data.choices?.[0]?.message?.content || '';
          if (!reply) throw new Error('AI 返回为空');

          this.history.push({ role: 'user', content: userMessage });
          this.history.push({ role: 'assistant', content: reply });
          if (this.history.length > 20) {
            this.history = this.history.slice(-20);
          }

          return reply;
        } finally {
          this.loading = false;
        }
      },

      async summarize(text) {
        return this.chat('请用中文总结以下 Markdown 文档的核心内容，3-5 个要点，使用 Markdown 列表格式。', {
          systemPrompt: '你是一个擅长总结文档的助手。',
          context: text,
        });
      },

      async translate(text, target = '中文') {
        return this.chat(`请将以下内容翻译成${target}，保留 Markdown 格式。如果原文已经是${target}，请回复"已是${target}"。`, {
          systemPrompt: '你是一个翻译专家，保留 Markdown 语法、代码块、链接等格式。',
          context: text,
        });
      },

      async continue_(text) {
        return this.chat('请基于以下内容自然地续写，保持风格一致，300 字以内。', {
          systemPrompt: '你是一个写作助手，擅长延续作者的思路。',
          context: text,
        });
      },

      async fixGrammar(text) {
        return this.chat('请检查以下 Markdown 文档的语法错误、错别字、标点问题，输出修正后的版本（保留 Markdown 结构）。如果没有错误，回复"✓ 没有发现问题"。', {
          systemPrompt: '你是一个严谨的文字编辑。',
          context: text,
        });
      },

      showConfigDialog() {
        const cfg = this.config || {};
        const presets = {
          'DeepSeek':     { endpoint: 'https://api.deepseek.com/v1',                model: 'deepseek-chat' },
          'OpenAI':       { endpoint: 'https://api.openai.com/v1',                  model: 'gpt-4o-mini' },
          '智谱 GLM':     { endpoint: 'https://open.bigmodel.cn/api/paas/v4',      model: 'glm-4-flash' },
          '月之暗面':     { endpoint: 'https://api.moonshot.cn/v1',                 model: 'moonshot-v1-8k' },
          'Ollama (本地)': { endpoint: 'http://localhost:11434/v1',                model: 'qwen2.5:7b' },
          '自定义':       { endpoint: '',                                          model: '' },
        };
        const presetNames = Object.keys(presets).join(' | ');
        const preset = prompt(`选择 AI 服务预设：\n${presetNames}\n\n输入名称（"自定义"则手动填）：`, 'DeepSeek');
        if (!preset) return;
        if (!presets[preset]) {
          showToast('无效预设');
          return;
        }
        let endpoint = cfg.endpoint || presets[preset].endpoint;
        let model = cfg.model || presets[preset].model;
        if (preset === '自定义') {
          endpoint = prompt('API endpoint（不含 /chat/completions）：', endpoint) || '';
          if (!endpoint) return;
          model = prompt('模型名称：', model) || '';
          if (!model) return;
        } else {
          if (!cfg.endpoint) endpoint = presets[preset].endpoint;
          if (!cfg.model) model = presets[preset].model;
        }
        const apiKey = prompt(`API Key（${preset}）：`, cfg.apiKey || '');
        if (!apiKey) return;

        this.saveConfig({ endpoint, apiKey, model, preset });

        this.chat('你好，请用一句话自我介绍。', { max_tokens: 200 })
          .then(reply => {
            showToast(`✓ AI 已连接：${reply.slice(0, 30)}`);
          })
          .catch(err => showToast('连接失败：' + err.message));
      },

      open() {
        if (!this.isConfigured()) {
          if (confirm('AI 助手未配置。\n\n现在配置？\n（也可以选择跳过）')) {
            this.showConfigDialog();
            return;
          }
        }
        this.showChatPanel();
      },

      showChatPanel() {
        const existing = document.getElementById('ai-panel');
        if (existing) existing.remove();

        const panel = document.createElement('div');
        panel.id = 'ai-panel';
        panel.className = 'ai-panel';
        panel.innerHTML = `
          <div class="ai-mask"></div>
          <div class="ai-body">
            <div class="ai-header">
              <span class="ai-title">🤖 AI 助手 <small style="color:var(--fg-muted);font-weight:400;font-size:11px;">${this.config?.preset || ''} · ${this.config?.model || ''}</small></span>
              <button class="ai-close">✕</button>
            </div>
            <div class="ai-messages" id="ai-messages">
              ${this.history.length === 0 ? `
                <div class="ai-empty">
                  <p>👋 你好！选一个操作开始：</p>
                  <div class="ai-presets">
                    <button data-cmd="summarize">📝 总结当前文档</button>
                    <button data-cmd="translate">🌐 翻译为中文</button>
                    <button data-cmd="continue">✍️ 续写</button>
                    <button data-cmd="fix">🔧 修正语法</button>
                  </div>
                </div>
              ` : ''}
            </div>
            <div class="ai-input-wrap">
              <textarea class="ai-input" id="ai-input" placeholder="问点什么... (Shift+Enter 换行)"></textarea>
              <button class="ai-send" id="ai-send">发送</button>
            </div>
            <div class="ai-footer">
              <button class="ai-mini" data-cmd="config">⚙️ 配置</button>
              <button class="ai-mini" data-cmd="clear">🗑️ 清空对话</button>
              <button class="ai-mini" data-cmd="reconfig">🔄 重新配置</button>
            </div>
          </div>
        `;
        document.body.appendChild(panel);
        requestAnimationFrame(() => panel.classList.add('show'));

        const close = () => {
          panel.classList.remove('show');
          setTimeout(() => panel.remove(), 250);
        };

        panel.querySelector('.ai-mask').addEventListener('click', close);
        panel.querySelector('.ai-close').addEventListener('click', close);
        panel.querySelectorAll('[data-cmd]').forEach(btn => {
          btn.addEventListener('click', () => this.handleCommand(btn.dataset.cmd, close));
        });

        const send = async () => {
          const input = panel.querySelector('#ai-input');
          const msg = input.value.trim();
          if (!msg || this.loading) return;
          input.value = '';
          this.appendMessage('user', msg);
          await this.askAI(msg);
        };
        panel.querySelector('#ai-send').addEventListener('click', send);
        panel.querySelector('#ai-input').addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        });

        const messages = panel.querySelector('#ai-messages');
        messages.scrollTop = messages.scrollHeight;
      },

      async handleCommand(cmd) {
        if (cmd === 'config' || cmd === 'reconfig') {
          this.showConfigDialog();
          return;
        }
        if (cmd === 'clear') {
          this.history = [];
          const messages = document.querySelector('#ai-messages');
          if (messages) messages.innerHTML = `<div class="ai-empty"><p>对话已清空。</p></div>`;
          return;
        }
        if (!this.isConfigured()) {
          showToast('请先配置 AI');
          return;
        }

        const editor = document.getElementById('editor');
        const text = editor ? editor.value : '';

        let promise;
        let userLabel = '';
        switch (cmd) {
          case 'summarize':
            userLabel = '📝 总结当前文档';
            promise = this.summarize(text);
            break;
          case 'translate':
            userLabel = '🌐 翻译为中文';
            promise = this.translate(text, '中文');
            break;
          case 'continue':
            userLabel = '✍️ 续写';
            promise = this.continue_(text);
            break;
          case 'fix':
            userLabel = '🔧 修正语法';
            promise = this.fixGrammar(text);
            break;
          default: return;
        }

        this.appendMessage('user', userLabel);
        await this.askAI('', promise);
      },

      async askAI(userMsg, prebuiltPromise) {
        if (!this.isConfigured()) {
          showToast('请先配置 AI');
          return;
        }
        const messages = document.getElementById('ai-messages');
        const thinking = document.createElement('div');
        thinking.className = 'ai-msg ai-thinking';
        thinking.textContent = '🤔 思考中...';
        messages.appendChild(thinking);
        messages.scrollTop = messages.scrollHeight;

        try {
          const reply = prebuiltPromise || await this.chat(userMsg, {
            context: document.getElementById('editor')?.value || '',
          });
          thinking.remove();
          this.appendMessage('assistant', reply);
          if (userMsg && !prebuiltPromise) {
            this.history.push({ role: 'user', content: userMsg });
            this.history.push({ role: 'assistant', content: reply });
          }
        } catch (e) {
          thinking.remove();
          this.appendMessage('error', '❌ ' + e.message);
        }
      },

      appendMessage(role, text) {
        const messages = document.getElementById('ai-messages');
        if (!messages) return;
        const empty = messages.querySelector('.ai-empty');
        if (empty) empty.remove();

        const div = document.createElement('div');
        div.className = `ai-msg ai-${role}`;
        if (role === 'user') {
          div.textContent = text;
        } else {
          try {
            if (typeof marked !== 'undefined') {
              div.innerHTML = marked.parse(text);
            } else {
              div.textContent = text;
            }
            if (typeof hljs !== 'undefined') {
              div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            }
          } catch (_) {
            div.textContent = text;
          }
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      },
    };

    // ----------------------------------------------------------
    // 8.7 SyncManager - WebDAV 云同步
    //
    // 支持 WebDAV 协议的网盘：
    // - 坚果云 (https://www.jianguoyun.com/) - 国内访问快，推荐
    // - Nextcloud (自建)
    // - 群晖 Synology NAS
    // - box.com / 4shared 等支持 WebDAV 的网盘
    //
    // 同步策略：
    // - 每个文档以一个 .md 文件存储在 WebDAV 目录
    // - 同步时按更新时间戳决定下载/上传（last-write-wins）
    // - 文档元数据（标签、置顶等）单独存到 metadata.json
    // ----------------------------------------------------------
    const SyncManager = {
      config: null,         // {url, username, password, path}
      syncing: false,

      init() {
        const raw = localStorage.getItem(STORAGE_KEYS.syncConfig);
        if (raw) {
          try { this.config = JSON.parse(raw); } catch (_) {}
        }
        // 自动检测：每 5 分钟如果配置了 WebDAV 就尝试同步
        if (this.config) {
          setInterval(() => this.autoSync(), 5 * 60 * 1000);
          // 启动后延迟 5 秒自动同步一次
          setTimeout(() => this.autoSync(), 5000);
        }
      },

      isConfigured() {
        return !!(this.config && this.config.url && this.config.username);
      },

      saveConfig(cfg) {
        this.config = cfg;
        localStorage.setItem(STORAGE_KEYS.syncConfig, JSON.stringify(cfg));
      },

      clearConfig() {
        this.config = null;
        localStorage.removeItem(STORAGE_KEYS.syncConfig);
      },

      // Basic Auth header
      _authHeader() {
        if (!this.config) return '';
        return 'Basic ' + btoa(this.config.username + ':' + this.config.password);
      },

      _baseUrl() {
        let url = this.config.url.replace(/\/+$/, '');
        if (this.config.path) {
          url += '/' + this.config.path.replace(/^\/+|\/+$/g, '');
        }
        return url + '/';
      },

      async _request(method, url, body, contentType) {
        const headers = {
          'Authorization': this._authHeader(),
          'Accept': '*/*',
        };
        if (contentType) headers['Content-Type'] = contentType;
        if (method === 'PROPFIND') headers['Depth'] = '1';

        const resp = await fetch(url, {
          method,
          headers,
          body: body || null,
        });
        if (!resp.ok && resp.status !== 404 && resp.status !== 301 && resp.status !== 405) {
          throw new Error(`${method} ${url} → ${resp.status}`);
        }
        return resp;
      },

      async testConnection() {
        if (!this.isConfigured()) throw new Error('未配置');
        const resp = await this._request('PROPFIND', this._baseUrl());
        if (!resp.ok) throw new Error('服务器返回 ' + resp.status);
        return true;
      },

      async ensureDir() {
        // 递归创建目录（PROPPATCH + MKCOL）
        const url = this._baseUrl();
        try {
          await this._request('PROPFIND', url);
        } catch (e) {
          // 尝试创建
          try {
            await this._request('MKCOL', url);
          } catch (_) {}
        }
      },

      async listRemote() {
        // 列出远程所有 .md 文件
        const url = this._baseUrl();
        const resp = await this._request('PROPFIND', url);
        const xml = await resp.text();
        // 简易 XML 解析
        const docs = [];
        const re = /<D:href[^>]*>([^<]+\.md)<\/D:href>/g;
        let m;
        while ((m = re.exec(xml))) {
          const href = m[1].split('/').pop();
          const id = decodeURIComponent(href.replace('.md', ''));
          docs.push({ id, name: href });
        }
        return docs;
      },

      async downloadDoc(id) {
        const url = this._baseUrl() + encodeURIComponent(id) + '.md';
        const resp = await this._request('GET', url);
        if (resp.status === 404) return null;
        return await resp.text();
      },

      async uploadDoc(id, content) {
        const url = this._baseUrl() + encodeURIComponent(id) + '.md';
        await this._request('PUT', url, content, 'text/markdown;charset=utf-8');
      },

      async deleteDoc(id) {
        const url = this._baseUrl() + encodeURIComponent(id) + '.md';
        await this._request('DELETE', url);
      },

      async sync() {
        if (!this.isConfigured()) throw new Error('请先配置 WebDAV');
        if (this.syncing) throw new Error('已在同步中');
        this.syncing = true;
        try {
          await this.ensureDir();

          // 上传本地所有文档
          for (const doc of DocManager.docs) {
            try {
              const remote = await this.downloadDoc(doc.id);
              if (remote === null) {
                // 远端没有，上传
                await this.uploadDoc(doc.id, doc.content);
              } else {
                // 比较 last-write-wins（用内容 hash 简化为时间戳 + 长度）
                // 简单做法：每次都上传本地版本（用户主动 sync 时希望本地优先）
                // 改进：用 custom property 记录远端 mtime
                await this.uploadDoc(doc.id, doc.content);
              }
            } catch (e) {
              console.warn('同步失败', doc.id, e);
            }
          }

          // 拉取远端新增的文档
          const remoteList = await this.listRemote();
          for (const r of remoteList) {
            const exists = DocManager.docs.find(d => d.id === r.id);
            if (!exists) {
              try {
                const content = await this.downloadDoc(r.id);
                if (content !== null) {
                  DocManager.docs.push(DocManager._makeDoc(r.id, content));
                }
              } catch (_) {}
            }
          }

          DocManager._persist();
          DocManager.renderList();
          localStorage.setItem(STORAGE_KEYS.lastSync, Date.now().toString());
          return { uploaded: DocManager.docs.length };
        } finally {
          this.syncing = false;
        }
      },

      async autoSync() {
        if (this.syncing) return;
        try {
          const r = await this.sync();
          console.log('[Sync] 自动同步完成', r);
        } catch (e) {
          console.warn('[Sync] 自动同步失败', e.message);
        }
      },

      lastSyncTime() {
        const ts = localStorage.getItem(STORAGE_KEYS.lastSync);
        return ts ? new Date(parseInt(ts)) : null;
      },

      // 显示配置对话框
      showConfigDialog() {
        const cfg = this.config || {};
        const url = prompt('WebDAV 服务器地址\n\n例如：\n• https://dav.jianguoyun.com/dav\n• https://your-nextcloud.com/remote.php/webdav', cfg.url || '');
        if (!url) return;
        const username = prompt('用户名 / 账号', cfg.username || '');
        if (!username) return;
        const password = prompt('应用密码 / 密码（推荐使用应用专用密码）', cfg.password || '');
        if (!password) return;
        const path = prompt('子目录（可选，直接回车用根目录）', cfg.path || '马克档');

        this.saveConfig({ url, username, password, path });

        // 测试连接
        this.testConnection().then(() => {
          showToast('✓ WebDAV 连接成功');
          this.sync().then(r => showToast('已同步 ' + r.uploaded + ' 个文档'));
        }).catch(e => showToast('连接失败：' + e.message));
      },
    };

    // ----------------------------------------------------------
    // 8.8 同步配置 UI
    // ----------------------------------------------------------
    function showSyncMenu() {
      const cfg = SyncManager.config;
      const items = [];
      if (cfg) {
        const last = SyncManager.lastSyncTime();
        items.push(`✓ 已配置：${cfg.url.split('/').slice(0, 3).join('/')}...`);
        if (last) items.push(`最后同步：${last.toLocaleString('zh-CN')}`);
      } else {
        items.push('未配置 WebDAV');
      }
      items.push('');
      items.push(cfg ? '立即同步' : '配置 WebDAV');
      items.push('重新配置');
      if (cfg) items.push('清除配置');

      const choice = prompt(items.join('\n') + '\n\n请选择操作：\n1 = 立即同步 / 配置\n2 = 重新配置\n3 = 清除配置\n\n输入数字：');

      if (choice === '1') {
        if (cfg) {
          SyncManager.sync().then(r => showToast('已同步 ' + r.uploaded + ' 个文档'))
            .catch(e => showToast('同步失败：' + e.message));
        } else {
          SyncManager.showConfigDialog();
        }
      } else if (choice === '2') {
        SyncManager.showConfigDialog();
      } else if (choice === '3' && cfg) {
        if (confirm('清除 WebDAV 配置？本地文档保留。')) {
          SyncManager.clearConfig();
          showToast('已清除配置');
        }
      }
    }

    // ----------------------------------------------------------
    // 9. 抽屉菜单
    // ----------------------------------------------------------
    const Drawer = {
      init() {
        const drawer = $('drawer');
        const mask = $('drawer-mask');

        // 用单一标志统一开关,防止 Android WebView 偶发重放 click 导致开-关-开
        let isOpen = false;
        const setOpen = (next) => {
          if (isOpen === next) return;
          isOpen = next;
          drawer.classList.toggle('show', next);
          mask.classList.toggle('show', next);
        };
        const open = () => setOpen(true);
        // close 只在点击的是 mask 本体(非冒泡自 drawer)时关闭
        const close = (e) => { if (!e || e.target === mask) setOpen(false); };

        $('more-btn').addEventListener('click', (e) => {
          // 防止冒泡干扰其他监听器(MIUI WebView 已知问题)
          e.stopPropagation();
          open();
        });
        mask.addEventListener('click', close);

        // 操作绑定
        $('act-copy-html').addEventListener('click', async () => {
          const html = buildSelfContainedHTML($('preview-content'));
          const ok = await copyToClipboard(html);
          showToast(ok ? '已复制 HTML ✓' : '复制失败');
          close();
        });

        $('act-copy-md').addEventListener('click', async () => {
          const ok = await copyToClipboard($('editor').value);
          showToast(ok ? '已复制 Markdown ✓' : '复制失败');
          close();
        });

        $('act-download').addEventListener('click', () => {
          const text = $('editor').value;
          const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const ts = new Date().toISOString().slice(0, 10);
          a.download = `markdoc-${ts}.md`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('已下载 .md 文件 ✓');
          close();
        });

        $('act-import').addEventListener('click', () => {
          $('file-input').click();
          close();
        });

        $('act-sample').addEventListener('click', () => {
          if ($('editor').value.trim() && $('editor').value !== SAMPLE_DOC) {
            if (!confirm('当前内容将被示例文档覆盖，确定吗？')) { close(); return; }
          }
          ContentManager.loadSample();
          showToast('已加载示例文档 ✓');
          close();
        });

        $('act-clear').addEventListener('click', () => {
          if (!confirm('确定清空所有内容吗？此操作不可恢复。')) { close(); return; }
          ContentManager.clear();
          showToast('已清空');
          close();
        });

        $('act-sync').addEventListener('click', () => {
          close();
          if (typeof showSyncMenu === 'function') showSyncMenu();
        });

        $('act-ai').addEventListener('click', () => {
          close();
          if (typeof AIAssistant !== 'undefined') AIAssistant.open();
        });

        // 文件导入
        $('file-input').addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            ContentManager.set(ev.target.result);
            showToast(`已导入 ${file.name}`);
          };
          reader.onerror = () => showToast('读取失败');
          reader.readAsText(file);
          e.target.value = ''; // 重置，允许重复选择同一文件
        });

        // PWA 安装按钮
        const pwaInstallItem = $('pwa-install-item');
        const pwaInstallBtn = $('act-install-pwa');
        if (pwaInstallBtn) {
          pwaInstallBtn.addEventListener('click', async () => {
            if (window.installPWA) {
              const ok = await window.installPWA();
              if (ok) {
                showToast('已添加到桌面 🎉');
              } else {
                showToast('已取消安装');
              }
            } else {
              showToast('当前浏览器不支持 PWA 安装，请用 Chrome / Edge / Safari');
            }
            close();
          });

          // 监听可安装事件，显示入口
          window.addEventListener('pwa-installable', (e) => {
            if (pwaInstallItem) {
              pwaInstallItem.style.display = e.detail.show ? '' : 'none';
            }
          });
        }
      }
    };

    // ----------------------------------------------------------
    // 10. 移动键盘适配（visualViewport）
    // ----------------------------------------------------------
    function setupKeyboardHandler() {
      if (!window.visualViewport) return;

      const app = $('app');
      const update = () => {
        const vv = window.visualViewport;
        // 键盘弹出时，让 #app 高度收缩到 visualViewport.height
        app.style.height = `${vv.height}px`;
      };

      window.visualViewport.addEventListener('resize', update);
      window.visualViewport.addEventListener('scroll', update);
    }

    // ----------------------------------------------------------
    // 10.5. 同步 navbar 实际高度到 CSS 变量(让 #reader 从 navbar 下方开始)
    // ----------------------------------------------------------
    function syncNavbarHeight() {
      const navbar = document.getElementById('navbar');
      if (!navbar) return;
      const h = navbar.getBoundingClientRect().height;
      document.documentElement.style.setProperty('--navbar-h', h + 'px');
    }

    // ----------------------------------------------------------
    // 11. 启动
    // ----------------------------------------------------------
    function boot() {
      // 兜底：无论 boot() 中哪里抛错，启动页 1.5 秒后必定消失
      const fallbackHideSplash = setTimeout(() => {
        const sp = $('splash');
        if (sp && !sp.classList.contains('hidden')) {
          console.warn('[Boot] 启动超时兜底：强制关闭启动页');
          sp.classList.add('hidden');
          setTimeout(() => sp.remove(), 600);
        }
      }, 1500);

      // 安全执行函数：捕获单个模块错误，让其他模块继续
      const safe = (name, fn) => {
        try {
          fn();
        } catch (e) {
          // 用 stringify 而不是 console.error，多个参数 jsdom 会丢
          const msg = `[Boot] ${name} 失败: ${e && e.message ? e.message : String(e)}`;
          console.log(msg);
          if (e && e.stack) console.log(e.stack);
          // 写到 splash 错误框
          const errEl = document.getElementById('splash-error');
          if (errEl) {
            errEl.style.display = 'block';
            errEl.textContent = (errEl.textContent || '') + msg + '\n';
          }
          if (window.Android && window.Android.showToast) {
            try { window.Android.showToast(`${name} 加载失败`); } catch (_) {}
          }
        }
      };

      try {
        safe('marked 配置', () => configureMarked());
        safe('主题', () => ThemeManager.init());
        // 关键 boot 顺序：
        // 1) 内容管理（ContentManager.editor 必须先初始化，因为 DocManager 和 Reader.open 都依赖它）
        // 2) 文档管理（DocManager._syncToEditor 会调用 ContentManager.render）
        // 3) 视图模式（如果 localStorage 存了 viewMode='reader'，会触发 Reader.open → ContentManager.save）
        //
        // 历史上 bug 是 视图模式 跑在 内容管理 之前，
        // 导致 boot 阶段 Reader.open → ContentManager.save() 抛错 → Reader.isOpen 卡在 true → 用户首次点阅读按钮直接早返回。
        safe('内容管理', () => ContentManager.init());
        safe('文档管理', () => {
          if (typeof DocManager !== 'undefined') DocManager.init();
          if (typeof DocsUI !== 'undefined') DocsUI.init();
        });
        safe('视图模式', () => ViewManager.init());
        safe('抽屉菜单', () => Drawer.init());
        safe('云同步', () => { if (window.SyncManager) SyncManager.init(); });
        safe('AI 助手', () => { if (window.AIAssistant) AIAssistant.init(); });
        safe('拖拽文件', () => { if (typeof DragDrop !== 'undefined') DragDrop.init(); });
        safe('文档大纲', () => { if (typeof Outline !== 'undefined') Outline.init(); });
        safe('查找替换', () => { if (typeof FindReplace !== 'undefined') FindReplace.init(); });
        safe('多标签同步', () => { if (typeof MultiTabSync !== 'undefined') MultiTabSync.init(); });
        safe('阅读模式', () => { if (typeof Reader !== 'undefined') Reader.init(); });
        safe('键盘适配', () => setupKeyboardHandler());

        // 系统主题变化监听（兼容 MIUI WebView）
        try {
          if (typeof window.matchMedia === 'function') {
            const mq = window.matchMedia('(prefers-color-scheme: dark)');
            if (mq && typeof mq.addEventListener === 'function') {
              mq.addEventListener('change', () => {
                if (ThemeManager.current === 'auto') {
                  ThemeManager.set('auto', false);
                }
              });
            }
          }
        } catch (e) { console.warn('主题监听注册失败', e); }

        // 同步 navbar 高度(让 reader 从 navbar 下方开始,保证切换按钮位置不变)
        try {
          syncNavbarHeight();
          // 视口变化时重测(横竖屏切换 / 软键盘)
          window.addEventListener('resize', syncNavbarHeight);
          if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncNavbarHeight);
          }
        } catch (e) { console.warn('navbar 高度同步失败', e); }

        // 按钮事件（每个独立 try/catch）
        safe('主题按钮', () => $('theme-toggle').addEventListener('click', () => ThemeManager.cycle()));

        // 全局快捷键：双击 `R` 键进入阅读模式（在非编辑状态）
        try {
          let lastR = 0;
          document.addEventListener('keydown', (e) => {
            if (e.key === 'r' && !e.ctrlKey && !e.metaKey && !e.altKey) {
              const active = document.activeElement;
              if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
              const now = Date.now();
              if (now - lastR < 400 && typeof ViewManager !== 'undefined') {
                // 走 ViewManager 而不是 Reader.toggle,这样 toggle 按钮高亮和 viewMode 状态都同步
                ViewManager.set(ViewManager.current === 'reader' ? 'edit' : 'reader');
                lastR = 0;
              } else {
                lastR = now;
              }
            }
          });
        } catch (_) {}

        console.log('%c✓ 马克档启动完成', 'color:#2ECC71;font-weight:bold;font-size:14px;');
      } catch (e) {
        console.error('[Boot] 致命错误:', e);
      } finally {
        // 取消兜底定时器（如果正常路径能关启动页）
        clearTimeout(fallbackHideSplash);

        // 正常路径：800ms 后淡出启动页
        setTimeout(() => {
          const sp = $('splash');
          if (sp) {
            sp.classList.add('hidden');
            setTimeout(() => sp.remove(), 600);
          }
        }, 600);
      }

      // 防止 iOS 双击放大
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });

      console.log('%c马克档 Markdown Mobile Browser', 'color:#FF5A5F;font-size:16px;font-weight:bold;');
      console.log('%c你的随身文档浏览器', 'color:#9A98A4;font-size:12px;');
    }

    // 等待 marked.js 加载完成
    if (typeof marked !== 'undefined') {
      boot();
    } else {
      window.addEventListener('DOMContentLoaded', () => {
        // 兜底：如果 CDN 加载失败，使用一个超简易的 fallback
        if (typeof marked === 'undefined') {
          console.warn('marked.js 加载失败，使用简易渲染');
          window.marked = {
            parse: function(md) {
              return '<pre>' + md.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</pre>';
            }
          };
        }
        boot();
      });
    }
  </script>

  <!-- ============================================================
       原生 App 桥接层（仅 Android WebView 生效）
       检测 window.Android 是否存在，存在则启用原生能力：
       - 保存到系统 Downloads
       - 系统分享面板
       - 文件导入
       - 系统主题变化监听
       ============================================================ -->
  <script>
    (function() {
      'use strict';

      const IS_NATIVE = typeof window.Android !== 'undefined' && window.Android.isNative();

      // --------------------------------------------------------
      // Web 模式调试覆盖层（仅 localhost / ?debug=1 触发）
      // --------------------------------------------------------
      const SHOW_WEB_DEBUG = !IS_NATIVE && (
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1' ||
        new URLSearchParams(window.location.search).has('debug')
      );

      if (!IS_NATIVE && SHOW_WEB_DEBUG) {
        console.log('%c🌐 马克档 Web 模式 (调试)', 'color:#FF5A5F;font-weight:bold;font-size:14px;');
        console.log('原生桥接不可用，以下功能将使用浏览器方式：');
        console.log('  • 保存到系统 Downloads → 浏览器下载');
        console.log('  • 分享给朋友 → 仅原生可用');
        console.log('  • 打开文件选择器 → <input type="file">');
        console.log('');
        console.log('%c提示：URL 加 ?debug=1 强制启用调试界面', 'color:#999;');
      }

      if (!IS_NATIVE) {
        // --------------------------------------------------------
        // 注册 Service Worker（PWA 离线 + 桌面图标）
        // --------------------------------------------------------
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
              .then((reg) => {
                console.log('%c[SW] 已注册, scope:', 'color:#9A98A4;', reg.scope);
                // 检测更新
                reg.addEventListener('updatefound', () => {
                  console.log('[SW] 发现新版本，正在后台安装...');
                });
              })
              .catch((err) => {
                console.warn('[SW] 注册失败（不影响主功能）', err);
              });
          });
        }

        // PWA 安装提示
        let deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredInstallPrompt = e;
          console.log('[PWA] 安装提示就绪');
          // 触发自定义 UI 显示
          window.dispatchEvent(new CustomEvent('pwa-installable', { detail: { show: true } }));
        });
        window.addEventListener('appinstalled', () => {
          console.log('[PWA] 已安装到桌面');
          deferredInstallPrompt = null;
          window.dispatchEvent(new CustomEvent('pwa-installable', { detail: { show: false } }));
        });
        window.installPWA = async function() {
          if (!deferredInstallPrompt) {
            console.warn('[PWA] 安装提示未就绪');
            return false;
          }
          deferredInstallPrompt.prompt();
          const { outcome } = await deferredInstallPrompt.userChoice;
          console.log('[PWA] 用户选择:', outcome);
          deferredInstallPrompt = null;
          return outcome === 'accepted';
        };

        if (SHOW_WEB_DEBUG) {
          window.addEventListener('DOMContentLoaded', () => {
            injectWebDebugOverlay();
          });
        }
        console.log('马克档运行在 Web 模式下，原生桥接未启用');
        return;
      }

      console.log('%c📱 马克档 Native Bridge 已启用', 'color:#FF5A5F;font-weight:bold;');

      // --------------------------------------------------------
      // 1. 暴露导入接口（被原生端调用）
      // --------------------------------------------------------
      window.importMarkdown = function(text) {
        try {
          ContentManager.set(text);
          showToast('已从原生端导入 ✓');
          if (window.Android) window.Android.haptic(15);
        } catch (e) {
          console.error('导入失败', e);
          showToast('导入失败：' + e.message);
        }
      };

      // --------------------------------------------------------
      // 2. 监听原生主题变化（系统切深色时同步 Web 主题）
      // --------------------------------------------------------
      window.onSystemThemeChange = function(isDark) {
        if (ThemeManager.current === 'auto') {
          ThemeManager.set('auto', false);
        }
      };

      // --------------------------------------------------------
      // 3. 改写下载行为：原生 App 下保存到 Downloads
      // --------------------------------------------------------
      const nativeDownload = function(filename, content) {
        try {
          const ts = new Date().toISOString().slice(0, 10);
          const finalName = (filename || `markdoc-${ts}`).replace(/\.md$/i, '') + '.md';
          window.Android.saveToDownloads(content, finalName);
          window.Android.haptic(20);
        } catch (e) {
          console.error('原生保存失败，回退到浏览器下载', e);
          // 兜底用浏览器方式
          const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename + '.md';
          a.click();
          URL.revokeObjectURL(url);
        }
      };

      // 拦截抽屉菜单中的「下载 .md 文件」
      const origDownloadBtn = document.getElementById('act-download');
      if (origDownloadBtn) {
        origDownloadBtn.onclick = function() {
          nativeDownload('markdoc-' + new Date().toISOString().slice(0, 10), document.getElementById('editor').value);
          // 关闭抽屉
          document.getElementById('drawer').classList.remove('show');
          document.getElementById('drawer-mask').classList.remove('show');
        };
      }

      // --------------------------------------------------------
      // 4. 改写导入行为：调用原生文件选择器
      // --------------------------------------------------------
      const origImportBtn = document.getElementById('act-import');
      if (origImportBtn) {
        origImportBtn.onclick = function() {
          window.Android.openFilePicker();
          document.getElementById('drawer').classList.remove('show');
          document.getElementById('drawer-mask').classList.remove('show');
        };
      }

      // --------------------------------------------------------
      // 5. 在抽屉菜单中追加「分享给朋友」选项（仅原生可见）
      // --------------------------------------------------------
      const shareItem = document.createElement('li');
      shareItem.innerHTML = `
        <button class="drawer-item" id="act-share">
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
          </span>
          <span class="meta">
            <span class="label">分享给朋友</span>
            <span class="desc">调起系统分享面板</span>
          </span>
        </button>
      `;
      const drawerList = document.querySelector('.drawer-list');
      if (drawerList) {
        // 插在「下载 .md」之后
        const downloadLi = origDownloadBtn ? origDownloadBtn.closest('li') : null;
        if (downloadLi && downloadLi.nextSibling) {
          drawerList.insertBefore(shareItem, downloadLi.nextSibling);
        } else {
          drawerList.appendChild(shareItem);
        }
        const actShare = document.getElementById('act-share');
        if (actShare) {
          actShare.onclick = function() {
            const text = document.getElementById('editor').value;
            window.Android.shareText(text, '分享 Markdown');
            document.getElementById('drawer').classList.remove('show');
            document.getElementById('drawer-mask').classList.remove('show');
          };
        }
      }

      // --------------------------------------------------------
      // 6. 改写复制 HTML/复制 MD：优先用原生剪贴板（更稳）
      // --------------------------------------------------------
      const origCopyHtml = document.getElementById('act-copy-html');
      const origCopyMd = document.getElementById('act-copy-md');
      if (origCopyHtml) {
        origCopyHtml.onclick = async function() {
          const html = buildSelfContainedHTML(document.getElementById('preview-content'));
          const ok = await copyToClipboard(html);
          window.Android.showToast(ok ? '已复制 HTML ✓' : '复制失败');
          window.Android.haptic(15);
          document.getElementById('drawer').classList.remove('show');
          document.getElementById('drawer-mask').classList.remove('show');
        };
      }
      if (origCopyMd) {
        origCopyMd.onclick = async function() {
          const ok = await copyToClipboard(document.getElementById('editor').value);
          window.Android.showToast(ok ? '已复制 Markdown ✓' : '复制失败');
          window.Android.haptic(15);
          document.getElementById('drawer').classList.remove('show');
          document.getElementById('drawer-mask').classList.remove('show');
        };
      }

      // --------------------------------------------------------
      // 7. 通知原生端：JS 就绪
      // --------------------------------------------------------
      if (window.onNativeReady) {
        setTimeout(() => window.onNativeReady(), 100);
      }

      // --------------------------------------------------------
      // 8. 显示设备信息（让用户知道原生桥接工作正常）
      // --------------------------------------------------------
      try {
        const deviceInfo = window.Android.getDeviceInfo();
        const infoLines = deviceInfo.split('\n');
        const deviceLine = infoLines.find(l => l.startsWith('Device:'));
        const romLine = infoLines.find(l => l.startsWith('ROM:'));
        if (deviceLine) {
          // 在状态栏显示设备 + ROM 标识
          const storageEl = document.getElementById('status-storage');
          if (storageEl) {
            const device = deviceLine.replace('Device: ', '').trim();
            const rom = romLine ? romLine.replace('ROM: ', '').trim() : '';
            storageEl.title = `${deviceLine}\n${romLine || ''}`;
            storageEl.textContent = `📱 ${rom || device}`;
          }
        }
      } catch (e) {
        console.warn('设备信息读取失败', e);
      }
    })();
  </script>
