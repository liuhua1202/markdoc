      },

      close() {
        if (!this.isOpen) return;
        this.isOpen = false;

        if (this.el) {
          this.el.classList.add('hide');
          const elToRemove = this.el;
          setTimeout(() => {
            try { elToRemove.remove(); } catch (_) {}
          }, 300);
          this.el = null;
        }

        if (this._onScrollBound) {
          window.removeEventListener('scroll', this._onScrollBound);
        }
        if (this._onTapBound && this._lastElForTap) {
          try { this._lastElForTap.removeEventListener('click', this._onTapBound); } catch (_) {}
        }

        // 恢复主 UI
        document.body.style.overflow = '';
        if (this._restoreUI) {
          try { this._restoreUI(); } catch (_) {}
        }

        // 恢复 ViewManager 状态(如果是从 reader 触发关闭则切回 edit)
        if (typeof ViewManager !== 'undefined' && ViewManager.current === 'reader') {
          try { ViewManager.set('edit', false); } catch (_) {}
        }
      },

      toggle() {
        this.isOpen ? this.close() : this.open();
      },

      _build() {
        // 移除已有的
        const existing = document.getElementById('reader');
        if (existing) existing.remove();

        this.el = document.createElement('div');
        this.el.id = 'reader';
        this._lastElForTap = this.el;
        this.el.innerHTML = `
          <div class="reader-progress"><div class="reader-progress-bar" id="reader-progress-bar"></div></div>

          <article class="reader-content" id="reader-content"></article>

          <div class="reader-stats" id="reader-stats"></div>

          <div class="reader-controls" id="reader-controls">
            <div class="reader-control-group">
              <span class="label">字号</span>
              <button class="opt" data-size="small">小</button>
              <button class="opt" data-size="medium">中</button>
              <button class="opt" data-size="large">大</button>
              <button class="opt" data-size="xlarge">巨</button>
            </div>
            <div class="reader-control-group">
              <span class="label">字体</span>
              <button class="opt" data-font="sans">无</button>
              <button class="opt" data-font="serif">衬</button>
              <button class="opt" data-font="mono">等</button>
            </div>
            <div class="reader-control-group">
              <span class="label">行距</span>
              <button class="opt" data-line="compact">紧</button>
              <button class="opt" data-line="comfortable">适</button>
              <button class="opt" data-line="relaxed">宽</button>
            </div>
            <div class="reader-control-group">
              <span class="label">主题</span>
              <button class="opt" data-theme="paper">白</button>
              <button class="opt" data-theme="sepia">米</button>
              <button class="opt" data-theme="dark">深</button>
              <button class="opt" data-theme="black">墨</button>
            </div>
          </div>
        `;
        document.body.appendChild(this.el);

        // 注意:不再绑定 reader-back / reader-view-toggle — 切回编辑统一走
        // navbar 里的 view-toggle-btn(图标按钮,位置始终不变)

        // 设置按钮
        this.el.querySelectorAll('.reader-control-group .opt').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const opt = e.currentTarget;
            const group = opt.parentElement;
            const type = opt.dataset.size ? 'size' :
                         opt.dataset.font ? 'font' :
                         opt.dataset.line ? 'lineHeight' :
                         opt.dataset.theme ? 'theme' : null;
            if (!type) return;
            const value = opt.dataset[type === 'lineHeight' ? 'line' : type];
            this.setSetting(type, value);
          });
        });

        // 阻止 body 滚动
        document.body.style.overflow = 'hidden';
      },

      _render() {
        const editor = document.getElementById('editor');
        const src = editor ? editor.value : '';
        const preview = document.getElementById('preview-content');

        // 标题:取文档标题或首行
        const active = (typeof DocManager !== 'undefined') ? DocManager.active() : null;
        const docTitle = active?.title || src.split('\n').find(l => l.trim())?.replace(/^#+\s*/, '').slice(0, 60) || '无标题';

        // 用现有的预览 DOM 拷贝过来（保留已渲染的高亮/图表）
        const content = document.getElementById('reader-content');
        let body = '';
        if (preview) {
          body = preview.innerHTML;
        } else if (typeof marked !== 'undefined') {
          body = marked.parse(src);
        }
        // 标题放在内容最前(用 H1 样式,跟正文区分)
        const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const titleHtml = `<h1 class="reader-title">${esc(docTitle)}</h1>`;
        content.innerHTML = titleHtml + body;

        // 重新应用代码高亮 / Mermaid / KaTeX（如果已加载）
        this._postProcess();

        // 元数据：字数 + 阅读时长
        const cn = (src.match(/[\u4e00-\u9fa5]/g) || []).length;
        const en = (src.replace(/[\u4e00-\u9fa5]/g, ' ').match(/[a-zA-Z]+/g) || []).length;
        const words = cn + en;
        const minutes = Math.max(1, Math.round(cn / 300 + en / 200));

        // 底部统计
        const stats = document.getElementById('reader-stats');
        stats.textContent = `已读 0% · ${words} 字 · 约 ${minutes} 分钟`;
      },

      _postProcess() {
        const content = document.getElementById('reader-content');
        if (!content) return;
        if (typeof MarkdownExtensions !== 'undefined') {
          const editor = document.getElementById('editor');
          MarkdownExtensions.postProcess(content, editor ? editor.value : '');
        }
      },

      _applySettings() {
        if (!this.el) return;
        const s = this.settings;
        // 移除所有主题 class
        ['paper','sepia','dark','black'].forEach(t => this.el.classList.remove('theme-' + t));
        ['sans','serif','mono'].forEach(f => this.el.classList.remove('font-' + f));
        ['small','medium','large','xlarge'].forEach(sz => this.el.classList.remove('size-' + sz));
        ['compact','comfortable','relaxed'].forEach(l => this.el.classList.remove('line-' + l));

        this.el.classList.add('theme-' + s.theme);
        this.el.classList.add('font-' + s.font);
        this.el.classList.add('size-' + s.size);
        this.el.classList.add('line-' + s.lineHeight);

        // 标记当前激活的按钮
        this.el.querySelectorAll('.reader-control-group .opt').forEach(btn => {
          const isActive =
            btn.dataset.size === s.size ||
            btn.dataset.font === s.font ||
            btn.dataset.line === s.lineHeight ||
            btn.dataset.theme === s.theme;
          btn.classList.toggle('active', isActive);
        });
      },

      setSetting(type, value) {
        const key = type === 'lineHeight' ? 'lineHeight' : type;
        this.settings[key] = value;
        localStorage.setItem('markdoc.reader.v1', JSON.stringify(this.settings));
        this._applySettings();
      },

      adjustSize(delta) {
        const order = ['small', 'medium', 'large', 'xlarge'];
        const idx = order.indexOf(this.settings.size);
        const newIdx = Math.max(0, Math.min(order.length - 1, idx + delta));
        this.setSetting('size', order[newIdx]);
      },

      _onScroll() {
        if (!this.isOpen) return;
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const scrollHeight = document.documentElement.scrollHeight;
        const clientHeight = window.innerHeight;
        const max = Math.max(1, scrollHeight - clientHeight);
        const pct = Math.min(100, Math.max(0, (scrollTop / max) * 100));

        const bar = document.getElementById('reader-progress-bar');
        if (bar) bar.style.width = pct + '%';

        const stats = document.getElementById('reader-stats');
        if (stats) {
          const m = stats.textContent.match(/(\d+) 分钟/);
          const minutes = m ? m[1] : '?';
          stats.textContent = `已读 ${Math.round(pct)}% · 约 ${minutes} 分钟`;
        }

        // 滚动时自动隐藏工具栏
        this._scheduleHideControls();
      },

      _onTap(e) {
        // 点击内容区切换底部控制面板和统计的显隐
        // (顶部切换按钮在 navbar 里,tap 内容不再影响 toolbar — toolbar 已合并到 navbar)
        if (e.target.closest('.reader-controls')) return;
        const controls = document.getElementById('reader-controls');
        const stats = document.getElementById('reader-stats');
        if (controls) {
          const isShown = controls.classList.contains('show');
          if (isShown) {
            controls.classList.remove('show');
            stats && stats.classList.remove('show');
          } else {
            controls.classList.add('show');
            stats && stats.classList.add('show');
            this._scheduleHideControls();
          }
        }
      },

      _scheduleHideControls() {
        clearTimeout(this.controlsHideTimer);
        this.controlsHideTimer = setTimeout(() => {
          if (!this.isOpen) return;
          // 工具栏不再自动隐藏(里面有视图模式 toggle,必须常驻)
          const controls = document.getElementById('reader-controls');
          const stats = document.getElementById('reader-stats');
          setTimeout(() => {
            controls && controls.classList.remove('show');
            stats && stats.classList.remove('show');
          }, 3000);
        }, 200);
      },
    };

    // ----------------------------------------------------------
    // 6. 视图模式管理(简化:只有 edit / reader 两种)
    //   - edit:编辑器全屏,预览保持隐藏(但渲染照旧,给 Reader 用)
    //   - reader:reader overlay 浮层,沉浸式阅读(双击 R 进入)
    // 旧版 localStorage 存的 split/preview/reader 自动回落到 edit。
    // ----------------------------------------------------------
    const ViewManager = {
      current: 'edit',

      // 图标 SVG(两套:edit=铅笔 / reader=书)
      _icons: {
        // open book(点击切到阅读)— 编辑模式下显示
        reader: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
        // pencil(点击切到编辑)— 阅读模式下显示
        edit: '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
      },

      init() {
        const saved = localStorage.getItem(STORAGE_KEYS.viewMode);
        const mode = (saved === 'edit' || saved === 'reader') ? saved : 'edit';
        this.set(mode, false);
        this._bindToggle();
      },

      _bindToggle() {
        // 单个图标按钮:点击在 edit / reader 之间切换
        const btn = $('view-toggle-btn');
        if (btn) btn.addEventListener('click', () => {
          this.set(this.current === 'reader' ? 'edit' : 'reader');
        });
      },

      _syncToggle() {
        // 当前在 edit 模式 → 显示"书"图标(点它进入阅读)
        // 当前在 reader 模式 → 显示"铅笔"图标(点它返回编辑)
        const btn = $('view-toggle-btn');
        if (!btn) return;
        const icon = $('view-toggle-icon');
        const isEdit = this.current === 'edit';
        const target = isEdit ? 'reader' : 'edit';
        if (icon && this._icons[target]) {
          icon.innerHTML = this._icons[target];
        }
        btn.setAttribute('data-tip', target === 'reader' ? '阅读' : '编辑');
        btn.setAttribute('aria-label', target === 'reader' ? '切换到阅读视图' : '切换到编辑视图');
        btn.setAttribute('data-mode-target', target);
        btn.classList.toggle('active', !isEdit);  // 视觉高亮(在 reader 时)
      },

      set(mode, save = true) {
        const normalized = (mode === 'reader') ? 'reader' : 'edit';
        const prev = this.current;
        this.current = normalized;

        // 退出阅读模式(如果开着)
        if (normalized !== 'reader' && typeof Reader !== 'undefined' && Reader.isOpen) {
          Reader.close();
        }

        if (normalized === 'edit') {
          // 编辑视图
          const preview = $('preview-pane');
          if (preview) preview.classList.add('hidden');
        } else if (normalized === 'reader') {
          // 阅读视图
          if (typeof Reader !== 'undefined') Reader.open();
        }

        // 同步 navbar 模式属性(让 CSS 决定哪些 nav 按钮隐藏)
        const navbar = document.getElementById('navbar');
        if (navbar) navbar.setAttribute('data-mode', normalized);

        // 同步 toggle 按钮(图标 + 提示)
        this._syncToggle();

        // 仅持久化合法的模式(edit / reader)
        if (save && (normalized === 'edit' || normalized === 'reader')) {
          localStorage.setItem(STORAGE_KEYS.viewMode, normalized);
        }
      }
    };

    // ----------------------------------------------------------
    // 7. MarkdownExtensions - 代码高亮/图表/数学公式
    //
    // 懒加载策略：
    // - highlight.js 总是可用（同步加载在 <head>）
    // - Mermaid 仅当文档含 ```mermaid 时加载（2.5MB，按需）
    // - KaTeX 仅当文档含 $...$ / $$...$$ 时加载（~300KB，按需）
    // ----------------------------------------------------------
    const MarkdownExtensions = {
      mermaidLoaded: false,
      mermaidLoading: false,
      katexLoaded: false,
      katexLoading: false,

      postProcess(previewEl, source) {
        // 1. 代码高亮（同步）
        this.highlightCode(previewEl);

        // 2. 检测 mermaid 块
        if (/<pre class="mermaid">/i.test(previewEl.innerHTML)) {
          this.loadMermaid().then(() => this.renderMermaid(previewEl)).catch(e => {
            console.warn('Mermaid 渲染失败', e);
          });
        }

        // 3. 检测数学公式（$...$ 或 $$...$$）
        if (/\$[^$]+\$/.test(source) || /\$\$[\s\S]+\$\$/.test(source)) {
          this.loadKatex().then(() => this.renderMath(previewEl)).catch(e => {
            console.warn('KaTeX 渲染失败', e);
          });
        }
      },

      highlightCode(el) {
        if (typeof hljs === 'undefined') return;
        try {
          el.querySelectorAll('pre code').forEach(block => {
            // 跳过 mermaid 块
            if (block.parentElement.classList.contains('mermaid')) return;
            hljs.highlightElement(block);
          });
        } catch (e) {
          console.warn('代码高亮失败', e);
        }
      },

      // ---- Mermaid ----
      async loadMermaid() {
        if (this.mermaidLoaded) return;
        if (this.mermaidLoading) {
          // 等正在加载的 promise
          return new Promise(resolve => {
            const check = setInterval(() => {
              if (this.mermaidLoaded) { clearInterval(check); resolve(); }
            }, 100);
          });
        }
        this.mermaidLoading = true;
        try {
          await this._loadScript('vendor/mermaid.min.js');
          // 初始化 mermaid
          if (typeof mermaid !== 'undefined') {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            mermaid.initialize({
              startOnLoad: false,
              theme: isDark ? 'dark' : 'default',
              securityLevel: 'loose',
              fontFamily: 'inherit',
            });
          }
          this.mermaidLoaded = true;
          this.mermaidLoading = false;
        } catch (e) {
          this.mermaidLoading = false;
          throw e;
        }
      },

      async renderMermaid(el) {
        if (typeof mermaid === 'undefined') return;
        const blocks = el.querySelectorAll('pre.mermaid');
        if (!blocks.length) return;
        try {
          // mermaid 10+ API
          for (let i = 0; i < blocks.length; i++) {
            const block = blocks[i];
            const source = block.textContent;
            const id = 'mmd-' + Math.random().toString(36).slice(2, 10);
            try {
              const { svg } = await mermaid.render(id, source);
              const div = document.createElement('div');
              div.className = 'mermaid-container';
              div.innerHTML = svg;
              block.replaceWith(div);
            } catch (err) {
              block.innerHTML = `<span style="color:#E74C3C;">Mermaid 错误: ${err.message}</span><br><pre>${this._escapeHtml(source)}</pre>`;
              block.style.color = '#E74C3C';
            }
          }
        } catch (e) {
          console.error('Mermaid render failed', e);
        }
      },

      // ---- KaTeX ----
      async loadKatex() {
        if (this.katexLoaded) return;
        if (this.katexLoading) {
          return new Promise(resolve => {
            const check = setInterval(() => {
              if (this.katexLoaded) { clearInterval(check); resolve(); }
            }, 100);
          });
        }
        this.katexLoading = true;
        try {
          // 加载 CSS
          await this._loadCSS('vendor/katex.min.css');
          // 加载 JS
          await this._loadScript('vendor/katex.min.js');
          // 加载 auto-render
          await this._loadScript('vendor/auto-render.min.js');
          this.katexLoaded = true;
          this.katexLoading = false;
        } catch (e) {
          this.katexLoading = false;
          throw e;
        }
      },

      renderMath(el) {
        if (typeof renderMathInElement === 'undefined') return;
        try {
          renderMathInElement(el, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\[', right: '\\]', display: true },
              { left: '\\(', right: '\\)', display: false },
            ],
            throwOnError: false,
          });
        } catch (e) {
          console.warn('KaTeX 渲染失败', e);
        }
      },

      _escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      },

      _loadScript(src) {
        return new Promise((resolve, reject) => {
          // 已存在
          if (document.querySelector(`script[src="${src}"]`)) {
            resolve();
            return;
          }
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error('加载失败: ' + src));
          document.head.appendChild(s);
        });
      },

      _loadCSS(href) {
        return new Promise((resolve, reject) => {
          if (document.querySelector(`link[href="${href}"]`)) { resolve(); return; }
          const l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = href;
          l.onload = resolve;
          l.onerror = () => reject(new Error('CSS 加载失败: ' + href));
          document.head.appendChild(l);
        });
      },
    };

    // ----------------------------------------------------------
    // 8. 内容管理
    // ----------------------------------------------------------
    const ContentManager = {
      editor: null,
      preview: null,
      previewInfo: null,

      init() {
        this.editor = $('editor');
        this.preview = $('preview-content');
        this.previewInfo = $('preview-info');

        // 初次渲染（DocManager 会同步内容到 editor）
        this.render();

        // 监听输入（debounce 后保存 + 渲染）
        const onInput = debounce(() => {
          this.render();
          this.save();
        }, 120);

        this.editor.addEventListener('input', onInput);

        // Tab 键支持
        this.editor.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.editor.selectionStart;
            const end = this.editor.selectionEnd;
            this.editor.value = this.editor.value.substring(0, start) + '  ' + this.editor.value.substring(end);
            this.editor.selectionStart = this.editor.selectionEnd = start + 2;
            this.render();
            this.save();
          }
          // Ctrl/Cmd + S 手动保存
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            this.save();
            showToast('已保存 ✓');
          }
        });

        // 点击预览区收起键盘（移动端）
        this.preview.parentElement.addEventListener('click', () => {
          if (document.activeElement === this.editor) {
            this.editor.blur();
          }
        });
      },

      render() {
        const src = this.editor.value;
        if (!src.trim()) {
          this.preview.innerHTML = '<p style="color:var(--fg-muted);text-align:center;margin-top:60px;">在左侧开始输入 Markdown ✍️</p>';
          this.previewInfo.textContent = '空内容';
          return;
        }
        try {
          const html = marked.parse(src);
          this.preview.innerHTML = html;
          this.previewInfo.textContent = '已渲染';
          // 后续处理：代码高亮 / 图表 / 数学公式
          if (typeof MarkdownExtensions !== 'undefined') {
            MarkdownExtensions.postProcess(this.preview, src);
          }
          // 刷新文档大纲（如果打开着）
          if (typeof Outline !== 'undefined' && Outline.panel && Outline.panel.classList.contains('show')) {
            setTimeout(() => Outline._refresh(), 100);
          }
          this.updateStats();
        } catch (err) {
          this.preview.innerHTML = `<p style="color:#E74C3C;">渲染错误：${err.message}</p>`;
          this.previewInfo.textContent = '错误';
        }
      },

      save() {
        localStorage.setItem(STORAGE_KEYS.content, this.editor.value);
        // 多文档模式：保存到 DocManager 当前文档
        if (typeof DocManager !== 'undefined') {
          try {
            DocManager.saveCurrent(this.editor.value);
            // 多标签同步：广播变更
            if (typeof MultiTabSync !== 'undefined') {
              const active = DocManager.active();
              if (active) MultiTabSync.announceChange(active.id, this.editor.value);
            }
          } catch (_) {}
        }
        // 原生 App：同步备份到本地文件（防 MIUI 杀进程丢数据）
        if (window.Android && window.Android.dataBackup) {
          try { window.Android.dataBackup(this.editor.value); } catch (_) {}
        }
        const t = new Date();
        const hh = String(t.getHours()).padStart(2, '0');
        const mm = String(t.getMinutes()).padStart(2, '0');
        $('status-storage').textContent = `已保存 · ${hh}:${mm}`;
      },

      updateStats() {
        const text = this.editor.value;
        // 中英文混合字数统计
        const cnCount = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const enWords = (text.replace(/[\u4e00-\u9fa5]/g, ' ')
                              .match(/[a-zA-Z]+/g) || []).length;
        const total = cnCount + enWords;
        // 阅读时长（中文 300 字/分钟，英文 200 词/分钟）
        const minutes = Math.max(1, Math.round(cnCount / 300 + enWords / 200));
        $('status-words').textContent = `${total} 字`;
        $('status-time').textContent = `${minutes} 分钟阅读`;
      },

      set(text) {
        this.editor.value = text;
        this.render();
        this.save();
      },

      clear() {
        this.set('');
        // 原生 App 下同步清除本地备份
        if (window.Android && window.Android.dataBackupClear) {
          try { window.Android.dataBackupClear(); } catch (_) {}
        }
      },

      loadSample() {
        this.set(SAMPLE_DOC);
      }
    };

    // ----------------------------------------------------------
    // 8.5 DocManager - 多文档管理
    // ----------------------------------------------------------
    const DocManager = {
      docs: [],
      activeId: null,

      // 加载（自动从旧版单文档迁移）
      init() {
        const raw = localStorage.getItem(STORAGE_KEYS.docs);
        if (raw) {
          try {
            this.docs = JSON.parse(raw);
          } catch (_) {
            this.docs = [];
          }
        }

        // 迁移旧版单文档
        if (this.docs.length === 0) {
          const oldContent = localStorage.getItem(STORAGE_KEYS.content);
          if (oldContent) {
            const migrated = this._makeDoc('我的文档', oldContent);
            this.docs = [migrated];
            localStorage.setItem(STORAGE_KEYS.docs, JSON.stringify(this.docs));
            localStorage.removeItem(STORAGE_KEYS.content);
          } else {
            // 首次打开 → 加载示例
            const sample = this._makeDoc('欢迎使用马克档', SAMPLE_DOC);
            this.docs = [sample];
            this._persist();
          }
        }

        this.activeId = localStorage.getItem(STORAGE_KEYS.activeDoc) || this.docs[0].id;
        if (!this.docs.find(d => d.id === this.activeId)) {
          this.activeId = this.docs[0].id;
        }

        // 把当前文档内容同步到 ContentManager
        this._syncToEditor();
        this.renderList();
      },

      _makeDoc(title, content) {
        const now = Date.now();
        return {
          id: 'doc_' + Math.random().toString(36).slice(2, 10) + '_' + now.toString(36),
          title: title || '未命名文档',
          content: content || '',
          tags: [],
          pinned: false,
          createdAt: now,
          updatedAt: now,
          wordCount: this._countWords(content),
        };
      },

      _countWords(s) {
        const cn = (s.match(/[\u4e00-\u9fa5]/g) || []).length;
        const en = (s.replace(/[\u4e00-\u9fa5]/g, ' ').match(/[a-zA-Z]+/g) || []).length;
        return cn + en;
      },

      _persist() {
        try {
          localStorage.setItem(STORAGE_KEYS.docs, JSON.stringify(this.docs));
          localStorage.setItem(STORAGE_KEYS.activeDoc, this.activeId);
        } catch (e) {
          console.error('保存文档失败', e);
          showToast('保存失败：' + e.message);
        }
      },

      // 当前文档对象
      active() {
        return this.docs.find(d => d.id === this.activeId) || this.docs[0];
      },

      // 保存当前编辑内容到当前文档
      saveCurrent(content) {
        const doc = this.active();
        if (!doc) return;
        doc.content = content;
        doc.updatedAt = Date.now();
        doc.wordCount = this._countWords(content);
        // 自动从首行提取标题
        const firstLine = content.split('\n').find(l => l.trim().length > 0) || '';
        const cleaned = firstLine.replace(/^#+\s*/, '').replace(/[*_`]/g, '').trim();
        if (cleaned && cleaned.length <= 60) {
          doc.title = cleaned.slice(0, 60);
        }
        this._persist();
        this.renderList();
      },

      // 切换文档
      switchTo(docId) {
        // 先把当前编辑器内容保存
        const cur = this.active();
        if (cur) {
          cur.content = $('editor').value;
        }
        if (this.docs.find(d => d.id === docId)) {
          this.activeId = docId;
          this._persist();
          this._syncToEditor();
          this.renderList();
          showToast('已切换文档');
          // 多标签同步
          if (typeof MultiTabSync !== 'undefined') MultiTabSync.announceSwitch(docId);
        }
      },

      _syncToEditor() {
        const doc = this.active();
        if (doc) {
          $('editor').value = doc.content;
          ContentManager.render();
          ContentManager.updateStats();
        }
      },

      // 新建文档
      create(title = '未命名文档', content = '') {
        const doc = this._makeDoc(title, content);
        this.docs.unshift(doc);
        this.activeId = doc.id;
        this._persist();
        this._syncToEditor();
        this.renderList();
        showToast('已新建文档');
        return doc;
      },

      // 删除
      remove(docId) {
        const idx = this.docs.findIndex(d => d.id === docId);
        if (idx < 0) return;
        this.docs.splice(idx, 1);
        if (this.docs.length === 0) {
          this.create('未命名文档', '');
        } else if (this.activeId === docId) {
          this.activeId = this.docs[0].id;
          this._syncToEditor();
        }
        this._persist();
        this.renderList();
        showToast('已删除文档');
      },

      // 重命名
      rename(docId, newTitle) {
        const doc = this.docs.find(d => d.id === docId);
        if (doc && newTitle.trim()) {
          doc.title = newTitle.trim().slice(0, 60);
          doc.updatedAt = Date.now();
          this._persist();
          this.renderList();
        }
      },

      // 置顶/取消置顶
      togglePin(docId) {
        const doc = this.docs.find(d => d.id === docId);
        if (!doc) return;
        doc.pinned = !doc.pinned;
        doc.updatedAt = Date.now();
        this._persist();
        this.renderList();
      },

      // 复制
      duplicate(docId) {
        const src = this.docs.find(d => d.id === docId);
        if (!src) return;
        const copy = this._makeDoc(src.title + ' (副本)', src.content);
        copy.pinned = src.pinned;
        const idx = this.docs.findIndex(d => d.id === docId);
        this.docs.splice(idx + 1, 0, copy);
        this._persist();
        this.renderList();
        showToast('已复制');
      },

      // 搜索
      search(query) {
        const q = (query || '').trim().toLowerCase();
        if (!q) return this.docs.slice();
        return this.docs.filter(d =>
          d.title.toLowerCase().includes(q) ||
          d.content.toLowerCase().includes(q)
        );
      },

      // 排序：置顶 > 更新时间倒序
      sorted() {
        return this.docs.slice().sort((a, b) => {
          if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
          return b.updatedAt - a.updatedAt;
        });
      },

      // 渲染文档列表
      renderList(query) {
        const list = $('doc-list');
        if (!list) return;
        const docs = this.search(query);
        const sorted = docs.slice().sort((a, b) => {
          if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
          return b.updatedAt - a.updatedAt;
        });

        if (sorted.length === 0) {
          list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--fg-muted);font-size:13px;">
            ${query ? '没找到匹配的文档' : '还没有文档<br><span style="font-size:11px;">点下方 + 新建</span>'}
          </div>`;
          return;
        }

        list.innerHTML = sorted.map(d => {
          const active = d.id === this.activeId;
          const date = this._formatDate(d.updatedAt);
          const preview = (d.content || '').replace(/[#*_`>]/g, '').split('\n')
            .find(l => l.trim()) || '(空文档)';
          return `
            <div class="doc-item ${active ? 'active' : ''}" data-id="${d.id}">
              ${d.pinned ? '<span class="doc-pin">📌</span>' : ''}
              <div class="doc-meta">
                <div class="doc-title">${this._escapeHtml(d.title)}</div>
                <div class="doc-preview">${this._escapeHtml(preview.slice(0, 80))}</div>
                <div class="doc-info">
                  <span>${date}</span>
                  <span>·</span>
                  <span>${d.wordCount} 字</span>
                </div>
              </div>
              <div class="doc-actions">
                <button class="doc-act" data-act="pin" title="${d.pinned ? '取消置顶' : '置顶'}">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="${d.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 17v5"/><path d="M9 10.76V6h6v4.76l3.5 5.24H5.5z"/>
                  </svg>
                </button>
                <button class="doc-act" data-act="more" title="更多">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
                </button>
              </div>
            </div>
          `;
        }).join('');

        // 绑定点击事件
        list.querySelectorAll('.doc-item').forEach(el => {
          const id = el.dataset.id;
          el.querySelector('[data-act="pin"]').addEventListener('click', (e) => {
            e.stopPropagation();
            this.togglePin(id);
          });
          el.querySelector('[data-act="more"]').addEventListener('click', (e) => {
            e.stopPropagation();
            this._showItemMenu(id, el);
          });
          el.addEventListener('click', () => {
            this.switchTo(id);
            closeDocsPanel();
          });
        });
      },

      _escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      },

      _formatDate(ts) {
        const d = new Date(ts);
        const now = new Date();
        const diff = (now - d) / 1000;
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
        if (diff < 7 * 86400) return Math.floor(diff / 86400) + ' 天前';
        return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
      },

      _showItemMenu(docId, anchor) {
        // 简单的 ActionSheet
        const doc = this.docs.find(d => d.id === docId);
        if (!doc) return;
        const sheet = document.createElement('div');
        sheet.className = 'doc-action-sheet';
        sheet.innerHTML = `
          <div class="sheet-mask"></div>
          <div class="sheet-body">
            <div class="sheet-title">${this._escapeHtml(doc.title)}</div>
            <button class="sheet-item" data-act="rename">✏️ 重命名</button>
            <button class="sheet-item" data-act="duplicate">📋 复制</button>
            <button class="sheet-item" data-act="export-md">⬇️ 导出为 .md</button>
            <button class="sheet-item" data-act="export-json">⬇️ 导出为 JSON</button>
            <button class="sheet-item" data-act="copy-md">📄 复制内容</button>
            <button class="sheet-item danger" data-act="delete">🗑️ 删除</button>
            <button class="sheet-item cancel" data-act="cancel">取消</button>
          </div>
        `;
        document.body.appendChild(sheet);
        requestAnimationFrame(() => sheet.classList.add('show'));

        const close = () => {
          sheet.classList.remove('show');
          setTimeout(() => sheet.remove(), 250);
        };

        sheet.addEventListener('click', (e) => {
          const act = e.target.closest('[data-act]')?.dataset.act;
          if (!act || act === 'cancel') { close(); return; }
          if (e.target.classList.contains('sheet-mask')) { close(); return; }
          close();
          if (act === 'rename') {
            const newName = prompt('新标题', doc.title);
            if (newName) this.rename(docId, newName);
          } else if (act === 'duplicate') {
            this.duplicate(docId);
          } else if (act === 'export-md') {
            this._exportSingleMd(doc);
          } else if (act === 'export-json') {
            this._exportSingleJson(doc);
          } else if (act === 'copy-md') {
            copyToClipboard(doc.content).then(ok => showToast(ok ? '已复制 ✓' : '复制失败'));
          } else if (act === 'delete') {
            if (confirm(`确定删除「${doc.title}」吗？`)) this.remove(docId);
          }
        });
      },

      _exportSingleMd(doc) {
        const fname = doc.title.replace(/[\\/:*?"<>|]/g, '_') + '.md';
        const blob = new Blob([doc.content], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fname;
        a.click();
        URL.revokeObjectURL(url);
        showToast('已下载 ' + fname);
      },

      _exportSingleJson(doc) {
        const data = JSON.stringify(doc, null, 2);
        const fname = doc.title.replace(/[\\/:*?"<>|]/g, '_') + '.json';
        const blob = new Blob([data], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fname;
        a.click();
        URL.revokeObjectURL(url);
        showToast('已下载 ' + fname);
      },

      // 导出所有文档为 ZIP 风格 JSON
      exportAll() {
        const data = {
          version: 1,
          exportedAt: new Date().toISOString(),
          docs: this.docs,
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `markdoc-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('已导出 ' + this.docs.length + ' 个文档');
      },

      // 导入 JSON
      importAll(jsonText, merge = false) {
        try {
          const data = JSON.parse(jsonText);
          const docs = data.docs || (Array.isArray(data) ? data : []);
          if (!Array.isArray(docs) || docs.length === 0) {
            showToast('未发现文档');
            return 0;
          }
          if (!merge) this.docs = [];
          let added = 0;
          docs.forEach(d => {
            if (!d.id || !d.content) return;
            // 重新生成 id 避免冲突
            const fresh = this._makeDoc(d.title || '导入文档', d.content);
            fresh.pinned = !!d.pinned;
            fresh.tags = d.tags || [];
            fresh.createdAt = d.createdAt || Date.now();
            fresh.updatedAt = d.updatedAt || Date.now();
            this.docs.push(fresh);
            added++;
          });
          this._persist();
          this.renderList();
          return added;
        } catch (e) {
          showToast('导入失败：' + e.message);
          return 0;
        }
      },

      // 统计
      stats() {
        const total = this.docs.length;
        const totalWords = this.docs.reduce((s, d) => s + d.wordCount, 0);
        const pinned = this.docs.filter(d => d.pinned).length;
        return { total, totalWords, pinned };
      },
    };

    function closeDocsPanel() {
      const panel = $('docs-panel');
      const mask = $('docs-mask');
      if (panel) panel.classList.remove('show');
      if (mask) mask.classList.remove('show');
    }

    function openDocsPanel() {
      const panel = $('docs-panel');
      const mask = $('docs-mask');
      if (panel) panel.classList.add('show');
      if (mask) mask.classList.add('show');
      DocManager.renderList();
      const search = $('doc-search');
      if (search) {
        search.value = '';
        setTimeout(() => search.focus(), 200);
      }
    }

    // ----------------------------------------------------------
    // ----------------------------------------------------------
    // 8.55 DragDrop - 拖拽文件支持
    // ----------------------------------------------------------
    const DragDrop = {
      init() {
        let dragCounter = 0;
        const overlay = this._createOverlay();

        document.addEventListener('dragenter', (e) => {
          e.preventDefault();
          dragCounter++;
          overlay.classList.add('show');
        });

        document.addEventListener('dragleave', (e) => {
          e.preventDefault();
          dragCounter--;
          if (dragCounter <= 0) {
            dragCounter = 0;
            overlay.classList.remove('show');
          }
        });

        document.addEventListener('dragover', (e) => {
          e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
          e.preventDefault();
          dragCounter = 0;
          overlay.classList.remove('show');

          const files = Array.from(e.dataTransfer.files);
          if (!files.length) return;

          files.forEach(file => {
            const name = file.name.toLowerCase();
            if (name.endsWith('.md') || name.endsWith('.markdown') || file.type === 'text/markdown' || file.type === 'text/plain') {
              this._readMdFile(file);
            } else if (name.endsWith('.json')) {
              this._readJsonFile(file);
            } else {
              showToast(`不支持的文件类型: ${name}`);
            }
          });
        });
      },

      _readMdFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const title = file.name.replace(/\.[^.]+$/, '');
          DocManager.create(title, e.target.result);
          showToast(`已导入: ${file.name}`);
        };
        reader.readAsText(file);
      },

      _readJsonFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const merge = confirm(`导入 JSON 备份？\n\n确定 = 合并到现有文档\n取消 = 替换所有文档`);
          const added = DocManager.importAll(e.target.result, merge);
          if (added > 0) showToast(`已导入 ${added} 个文档`);
        };
        reader.readAsText(file);
      },

      _createOverlay() {
        const overlay = document.createElement('div');
        overlay.className = 'drag-overlay';
        overlay.innerHTML = `
          <div class="drag-overlay-content">
            <div style="font-size:48px;">📄</div>
            <div style="font-size:18px;font-weight:600;margin-top:12px;">松开导入</div>
            <div style="font-size:13px;color:var(--fg-muted);margin-top:4px;">支持 .md / .markdown / .json</div>
          </div>
        `;
        const style = document.createElement('style');
        style.textContent = `
          .drag-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 90, 95, 0.15);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            pointer-events: none;
          }
          .drag-overlay.show {
            opacity: 1;
            visibility: visible;
          }
          .drag-overlay-content {
            padding: 40px 60px;
            background: var(--bg-elev);
            border: 3px dashed var(--brand);
            border-radius: 24px;
            text-align: center;
            color: var(--fg);
          }
        `;
        document.head.appendChild(style);
        document.body.appendChild(overlay);
        return overlay;
      },
    };

    // ----------------------------------------------------------
    // 8.56 Outline - 文档大纲 (TOC)
    // ----------------------------------------------------------
    const Outline = {
      panel: null,

      init() {
        // 由 docs-btn 旁的 outline-btn 触发
        const btn = $('outline-btn');
        if (btn) btn.addEventListener('click', () => this.toggle());
      },

      toggle() {
        if (this.panel && this.panel.classList.contains('show')) {
          this.close();
        } else {
          this.open();
        }
      },

      open() {
        if (!this.panel) this._create();
        this._refresh();
        this.panel.classList.add('show');
      },

      close() {
        if (this.panel) this.panel.classList.remove('show');
      },

      _create() {
        const mask = document.createElement('div');
        mask.className = 'outline-mask';
        mask.addEventListener('click', () => this.close());

        const panel = document.createElement('div');
        panel.className = 'outline-panel';
        panel.innerHTML = `
          <div class="outline-handle"></div>
          <div class="outline-header">
            <h3>📑 大纲</h3>
            <button class="outline-close">✕</button>
          </div>
          <div class="outline-list" id="outline-list"></div>
        `;

        const style = document.createElement('style');
        style.textContent = `
          .outline-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);

      _refresh() {
        if (!this.panel) return;
        const list = this.panel.querySelector('#outline-list');
        const preview = $('preview-content');
        if (!preview) {
          list.innerHTML = '<div class="outline-empty">预览未加载</div>';
          return;
        }
        const heads = preview.querySelectorAll('h1, h2, h3, h4');
        if (heads.length === 0) {
          list.innerHTML = '<div class="outline-empty">当前文档无标题<br><br>用 # 二级 ## 三级 添加标题</div>';
          return;
        }
        list.innerHTML = Array.from(heads).map(h => {
          const level = parseInt(h.tagName[1]);
          const text = h.textContent.replace(/#$/, '').trim();
          return `<a class="outline-item outline-h${level}" data-id="${h.id}">${this._escapeHtml(text)}</a>`;
        }).join('');

        list.querySelectorAll('.outline-item').forEach(el => {

              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              this.close();
            }
          });
        });

      _escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      },
    };

    // - 替换单个 / 全部替换
    // - 支持正则 / 大小写敏感
    // ----------------------------------------------------------
    const FindReplace = {
      open: false,
      matches: [],
      currentIndex: -1,
      query: '',
      options: { caseSensitive: false, regex: false, inPreview: false },

      init() {
        this._injectPanel();
        // Ctrl+F / Cmd+F 拦截
        document.addEventListener('keydown', (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'f' && !e.shiftKey) {

            this.show();

            e.preventDefault();
            this.show(true); // 打开并显示替换

            font-family: inherit;
          }

            color: var(--brand);
            border-color: var(--brand);

        document.head.appendChild(style);

        const panel = document.createElement('div');
        panel.id = 'find-panel';
        panel.innerHTML = `
          <div class="find-row">
            <input type="text" class="find-input" id="find-input" placeholder="查找..." />
            <button class="find-btn" id="find-prev" title="上一个 (Shift+Enter)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
            <button class="find-btn" id="find-next" title="下一个 (Enter)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <span class="find-info" id="find-info">0/0</span>
            <button class="find-btn" id="find-close" title="关闭 (Esc)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="find-row replace-row">
            <input type="text" class="find-input" id="replace-input" placeholder="替换为..." />
            <button class="find-btn" id="replace-one" title="替换 (单次)" style="width:auto;padding:0 10px;font-size:11px;">替换</button>
            <button class="find-btn" id="replace-all" title="全部替换" style="width:auto;padding:0 10px;font-size:11px;">全部</button>
          </div>
          <div class="find-meta">
            <div class="find-options">
              <button id="find-case" title="区分大小写">Aa</button>
              <button id="find-regex" title="正则">.*</button>
              <button id="find-target" title="在编辑器/预览中查找" style="font-size:11px;">编辑器</button>
            </div>
            <span class="find-toggle-replace" id="find-toggle-replace">⌃ 展开替换</span>
          </div>

        document.body.appendChild(panel);

        // 事件
        const findInput = panel.querySelector('#find-input');
        const replaceInput = panel.querySelector('#replace-input');
        findInput.addEventListener('input', () => this.find(findInput.value));
        findInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); e.shiftKey ? this.prev() : this.next(); }
        });
        replaceInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); this.replace(); }
        });
        panel.querySelector('#find-prev').addEventListener('click', () => this.prev());
        panel.querySelector('#find-next').addEventListener('click', () => this.next());
        panel.querySelector('#find-close').addEventListener('click', () => this.hide());
        panel.querySelector('#replace-one').addEventListener('click', () => this.replace());
        panel.querySelector('#replace-all').addEventListener('click', () => this.replaceAll());
        panel.querySelector('#find-case').addEventListener('click', (e) => {
          this.options.caseSensitive = !this.options.caseSensitive;
          e.target.classList.toggle('active', this.options.caseSensitive);
          this.find(findInput.value);
        });
        panel.querySelector('#find-regex').addEventListener('click', (e) => {
          this.options.regex = !this.options.regex;
          e.target.classList.toggle('active', this.options.regex);
          this.find(findInput.value);
        });
        const targetBtn = panel.querySelector('#find-target');
        targetBtn.addEventListener('click', (e) => {
          this.options.inPreview = !this.options.inPreview;
          e.target.textContent = this.options.inPreview ? '预览' : '编辑器';
          e.target.classList.toggle('active', this.options.inPreview);
          this.find(findInput.value);
        });
        panel.querySelector('#find-toggle-replace').addEventListener('click', (e) => {
          panel.classList.toggle('show-replace');
          e.target.textContent = panel.classList.contains('show-replace') ? '⌃ 收起替换' : '⌃ 展开替换';
        });
      },

      show(expandReplace = false) {
        this.open = true;
        const panel = document.getElementById('find-panel');
        if (expandReplace) panel.classList.add('show-replace');
        panel.classList.add('show');
        // 默认填入选中文字
        const editor = $('editor');
        if (editor) {
          const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd);
          const input = panel.querySelector('#find-input');
          if (sel) input.value = sel;
          input.focus();
          input.select();
          if (sel || input.value) this.find(input.value);
        }
      },

      hide() {
        this.open = false;
        document.getElementById('find-panel')?.classList.remove('show');
        // 移除编辑器高亮
        this._clearHighlights();
        const editor = $('editor');
        if (editor) editor.focus();
      },

      _buildRegex(query) {
        if (!query) return null;
        try {
          let pattern = query;
          if (!this.options.regex) pattern = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const flags = this.options.caseSensitive ? 'g' : 'gi';
          return new RegExp(pattern, flags);
        } catch (e) {
          return null;
        }
      },

      find(query) {
        this.query = query;
        this.matches = [];
        this.currentIndex = -1;

        const text = this.options.inPreview
          ? $('preview-content')?.textContent || ''
          : $('editor')?.value || '';

        const re = this._buildRegex(query);
        if (!re) {
          this._updateInfo(0, 0);
          this._clearHighlights();
          return;
        }

        let m;
        while ((m = re.exec(text)) !== null) {
          this.matches.push({ index: m.index, length: m[0].length });
          if (m.index === re.lastIndex) re.lastIndex++; // 防止 0 长度死循环
        }

        if (this.matches.length > 0) {
          this.currentIndex = 0;
          this._highlightCurrent();
        }
        this._updateInfo(this.matches.length ? this.currentIndex + 1 : 0, this.matches.length);
      },

      next() {
        if (!this.matches.length) return;
        this.currentIndex = (this.currentIndex + 1) % this.matches.length;
        this._highlightCurrent();
        this._updateInfo(this.currentIndex + 1, this.matches.length);
      },

      prev() {
        if (!this.matches.length) return;
        this.currentIndex = (this.currentIndex - 1 + this.matches.length) % this.matches.length;
        this._highlightCurrent();
        this._updateInfo(this.currentIndex + 1, this.matches.length);
      },

      _highlightCurrent() {
        const editor = $('editor');
        if (!editor || !this.matches.length) return;

        // 在 textarea 中高亮：设置选区到当前 match
        const m = this.matches[this.currentIndex];
        if (this.options.inPreview) {
          // 预览区：滚动 + 闪烁背景
          this._flashPreviewMatch(m);
          return;
        }

        editor.focus();
        editor.setSelectionRange(m.index, m.index + m.length);

        // 计算滚动位置
        const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 22;
        const lines = editor.value.substr(0, m.index).split('\n').length;
        const visibleLines = Math.floor(editor.clientHeight / lineHeight);
        const scrollLine = Math.max(0, lines - Math.floor(visibleLines / 2));
        editor.scrollTop = (scrollLine - 1) * lineHeight;
      },

      _flashPreviewMatch(m) {
        const preview = $('preview-content');
        if (!preview) return;
        // 简单实现：滚动到预览区顶部
        preview.scrollTop = 0;
        preview.parentElement.scrollTo({ top: 0, behavior: 'smooth' });
      },

      _clearHighlights() {
        // 无需清除 textarea 高亮（浏览器自带 selection 已处理）
      },

      replace() {
        if (this.options.inPreview) {
          showToast('预览区不支持替换');
          return;
        }
        if (!this.matches.length || this.currentIndex < 0) return;
        const editor = $('editor');
        const m = this.matches[this.currentIndex];
        const replacement = document.getElementById('replace-input').value;
        editor.value = editor.value.substring(0, m.index) + replacement + editor.value.substring(m.index + m.length);
        ContentManager.render();
        ContentManager.save();
        // 重新查找
        this.find(this.query);
        showToast('已替换');
      },

      replaceAll() {
        if (this.options.inPreview) {
          showToast('预览区不支持替换');
          return;
        }
        const editor = $('editor');
        const re = this._buildRegex(this.query);
        if (!re) return;
        const replacement = document.getElementById('replace-input').value;
        const before = editor.value;
        const after = before.replace(re, replacement);
        const count = (before.match(re) || []).length;
        editor.value = after;
        ContentManager.render();
        ContentManager.save();
        this.find(this.query);
        showToast(`已替换 ${count} 处`);
      },

      _updateInfo(current, total) {
        const info = document.getElementById('find-info');
        if (info) info.textContent = total ? `${current}/${total}` : '0/0';
      },
    };

    // ----------------------------------------------------------
    // 8.6.5 MultiTabSync - 多标签页同步
    //
    // 用 BroadcastChannel 让多个标签页同时编辑同一文档时实时同步
    // 适用场景：
    // - 用户在手机 + 电脑同时打开
    // - 同一个 App 多个窗口
    // ----------------------------------------------------------
    const MultiTabSync = {
      channel: null,
      activeDocId: null,
      lastContent: '',
      lastSwitch: 0,

      init() {
        if (typeof BroadcastChannel === 'undefined') {
          console.log('[MultiTab] BroadcastChannel 不支持');
          return;
        }
        try {
          this.channel = new BroadcastChannel('markdoc-sync');
          this.channel.addEventListener('message', (e) => this._onMessage(e.data));
          console.log('[MultiTab] 多标签同步已启用');
        } catch (e) {
          console.warn('[MultiTab] 初始化失败', e);
        }
      },

      // 文档切换
      announceSwitch(docId) {
        if (!this.channel) return;
        this.activeDocId = docId;
        this.lastSwitch = Date.now();
        this.channel.postMessage({ type: 'switch', docId, ts: Date.now() });
      },

      // 内容变更
      announceChange(docId, content) {
        if (!this.channel) return;
        // 简单的去抖
        if (content === this.lastContent) return;
        this.lastContent = content;
        this.channel.postMessage({ type: 'change', docId, content, ts: Date.now() });
      },

      _onMessage(msg) {
        if (!msg || !msg.type) return;

        if (msg.type === 'switch') {
          // 其他标签页切换了文档 → 切到对应文档
          if (typeof DocManager !== 'undefined' && msg.docId !== DocManager.activeId) {
            DocManager.switchTo(msg.docId);
            showToast(`其他窗口已切换到「${DocManager.active()?.title || '该文档'}」`);
          }
        } else if (msg.type === 'change') {
          // 其他标签页改了内容 → 同步（仅当是同一文档且本地未编辑）
          if (typeof DocManager === 'undefined') return;
          if (msg.docId !== DocManager.activeId) return;
          const editor = document.getElementById('editor');
          if (!editor) return;
          // 检查是否本地正在编辑（光标）
          const isFocused = document.activeElement === editor;
          if (isFocused) return; // 本地正在编辑，不覆盖

          editor.value = msg.content;
          ContentManager.render();
          DocManager.saveCurrent(msg.content);
          showToast('已同步其他窗口的修改', 1200);
        }
      },
    };
