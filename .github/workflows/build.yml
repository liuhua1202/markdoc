name: Build (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择要构建的平台'
        required: true
        type: choice
        options:
          - all
          - macos
          - windows
          - linux
          - android
          - web

jobs:
  build:
    name: 构建 ${{ inputs.platform }}
    runs-on: ${{ inputs.platform == 'windows' && 'windows-latest' || inputs.platform == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: 同步 Web 资源
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "android-app/app/src/main/assets" -ErrorAction SilentlyContinue | Out-Null
          Copy-Item "src/index.html" "android-app/app/src/main/assets/index.html" -Force
          Copy-Item "src/index.html" "desktop-app/src/index.html" -Force
          Copy-Item "src/index.html" "ios-app/www/index.html" -Force
          Copy-Item "src/index.html" "public/index.html" -Force
          Write-Host "✓ 同步完成" -ForegroundColor Green

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: macOS 构建
        if: inputs.platform == 'all' || inputs.platform == 'macos'
        working-directory: desktop-app
        env:
          CSC_LINK: ${{ secrets.MACOS_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # 导入证书
          KEYCHAIN_PATH=$RUNNER_TEMP/mac-build.keychain-db
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          echo "${{ secrets.MACOS_CERT_P12 }}" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "${{ secrets.MACOS_CERT_PWD }}" -A -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH

          npm ci
          npx electron-builder --mac --x64 --arm64 --publish never

      - name: Windows 构建
        if: inputs.platform == 'all' || inputs.platform == 'windows'
        working-directory: desktop-app
        run: |
          npm ci
          npx electron-builder --win --x64 --publish never

      - name: Linux 构建
        if: inputs.platform == 'all' || inputs.platform == 'linux'
        working-directory: desktop-app
        run: |
          npm ci
          npx electron-builder --linux --x64 --publish never

      - name: Android 构建
        if: inputs.platform == 'all' || inputs.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android 准备 + 构建
        if: inputs.platform == 'all' || inputs.platform == 'android'
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties
          keytool -genkey -v \
            -keystore android-app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          chmod +x android-app/gradlew
          cd android-app
          ./gradlew assembleDebug assembleRelease

      - name: Web 打包
        if: inputs.platform == 'all' || inputs.platform == 'web'
        run: |
          cd public
          zip -r ../markdoc-pwa.zip . -x "*.DS_Store"

      - name: 上传所有产物
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.platform }}
          path: |
            desktop-app/dist/*.dmg
            desktop-app/dist/*.exe
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb
            android-app/app/build/outputs/apk/**/*.apk
            markdoc-pwa.zip
          retention-days: 7
          if-no-files-found: ignore