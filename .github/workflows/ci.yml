name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-web:
    name: Web 构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 启动 dev server 并冒烟测试
        run: |
          # 启动 python http server
          python3 -m http.server 8765 &
          SERVER_PID=$!
          sleep 2

          # 验证关键资源可访问
          for path in / /index.html /manifest.json /sw.js /logo.svg \
                      /vendor/marked.min.js /vendor/highlight.min.js \
                      /icons/icon-192.png /icons/icon-512.png; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8765$path")
            if [ "$code" != "200" ]; then
              echo "❌ $path 返回 $code"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            echo "  ✓ $path"
          done

          # 验证 HTML 结构（关键元素存在）
          curl -s http://localhost:8765/index.html > /tmp/index.html
          for id in editor preview-content navbar drawer docs-btn more-btn splash; do
            if ! grep -q "id=\"$id\"" /tmp/index.html; then
              echo "❌ HTML 缺少 id=$id 元素"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
          echo "✓ Web 检查通过"

      - name: 启动页内容校验
        run: |
          # 启动页必须包含 logo + 标题
          grep -q "马克档" index.html || (echo "❌ 缺少 '马克档' 标题" && exit 1)
          grep -q "你的随身文档浏览器" index.html || (echo "❌ 缺少 slogan" && exit 1)
          echo "✓ 启动页校验通过"

  lint-markdown:
    name: Markdown 示例文档检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 验证 SAMPLE_DOC 包含所有语法
        run: |
          # 示例文档应展示所有支持的语法
          # 用单引号包裹 pattern，避免 YAML/shell 双重转义和反引号命令替换
          for pattern in '# 欢迎使用' '```javascript' '```python' '```mermaid' '$$' 'graph TD' 'task-list' '## 📊'; do
            if ! grep -qF "$pattern" index.html; then
              echo "⚠️ 示例文档可能缺少: $pattern"
            else
              echo "  ✓ $pattern"
            fi
          done

  android-debug:
    name: Android Debug 构建
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 同步 web 资源到 Android assets
        run: |
          mkdir -p android-app/app/src/main/assets/vendor
          cp index.html android-app/app/src/main/assets/
          cp -r vendor/. android-app/app/src/main/assets/vendor/
          cp -r icons/. android-app/app/src/main/assets/icons/
          cp logo.svg android-app/app/src/main/assets/
          cp manifest.json android-app/app/src/main/assets/
          cp sw.js android-app/app/src/main/assets/

      - name: 写入 local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-app/local.properties

      - name: 创建 debug keystore
        run: |
          keytool -genkey -v \
            -keystore android-app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: 授予 gradlew 执行权限
        run: chmod +x android-app/gradlew

      - name: 构建 Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 7